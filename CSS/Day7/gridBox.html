<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Box</title>
    <link rel="stylesheet" href="../assets/Style/gridBox.css">
</head>

<body>
    <div class="parent">
        
        <div class="child">
            <div class="head">
                <h2>Thumbnail</h2>
            </div>
            <div>
                <img src="../assets/images/common/front.jpg" height="200px" width="300px" alt="">
            </div>
            <div>
                
                <p> <span>Note:</span> This image tile will be used to represent this course across all your academy's landing pages.
                    Allowed formats: ".jpg, .png, .jpeg, .gif, .webp, .sketch"
                    Preferred minimum resolution: 480*270
                    Maximum size: 150kb</p>
                     <button>Change Image </button>
                <button>Remove Image</button>
            </div>
            
        </div>
    </div>
</body>

</html>
